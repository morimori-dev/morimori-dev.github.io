<style>
  body, .content, #sidebar, .post-title, h1, h2, h3, h4, h5, h6 {
    font-family: "Noto Sans JP", sans-serif !important;
  }
</style>

{% if page.layout == "post" %}
<meta name="page-lang" content="{{ page.content_lang | default: page.lang | default: 'en' }}">
{% if page.alt_ja %}
<meta name="lang-alt-ja" content="{{ page.alt_ja }}">
{% endif %}
{% if page.alt_en %}
<meta name="lang-alt-en" content="{{ page.alt_en }}">
{% endif %}
{% endif %}

<style>
  /* Center the avatar subject inside the circular frame in the sidebar. */
  #sidebar #avatar {
    overflow: hidden;
  }

  #sidebar #avatar > img,
  #sidebar img#avatar {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: 50% 42%;
  }

  /* Show a medium-sized author line between blog title and tagline in the sidebar. */
  #sidebar .site-title::after {
    content: "Author: Paul (Christian name)";
    display: block;
    margin: 0.55rem 0 0;
    padding: 0 0 0.55rem;
    font-size: 1.08rem;
    font-weight: 650;
    line-height: 1.35;
    color: var(--heading-color);
    border-bottom: 1px solid rgba(127, 127, 127, 0.35);
  }

  #sidebar .site-subtitle {
    margin-top: 0.58rem !important;
  }

  /* ── Language selector (fixed, always visible) ── */
  #lang-selector-wrap {
    position: fixed;
    top: 0.7rem;
    right: 3.8rem;
    z-index: 1030;
    display: flex;
    align-items: center;
  }

  /* On mobile, move selector to the left (after hamburger) to avoid title overlap */
  @media (max-width: 849px) {
    #lang-selector-wrap {
      left: 3.6rem;
      right: auto;
    }
  }
  #lang-selector {
    appearance: none;
    -webkit-appearance: none;
    background: var(--topbar-bg, var(--main-bg, #1e1e1e));
    border: 1px solid rgba(127, 127, 127, 0.4);
    border-radius: 5px;
    color: inherit;
    font-size: 0.78rem;
    padding: 0.2rem 0.55rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }
  #lang-selector:hover {
    border-color: rgba(127, 127, 127, 0.7);
  }
  #lang-selector option {
    background: var(--main-bg, #1e1e1e);
    color: inherit;
  }

  /* ─────────────────────────────────────────────────────────
     Language-based post filtering via <html> class.
     Uses CSS :has() so it works instantly, beats Bootstrap's
     d-flex !important, and persists across Turbo navigations.
     ───────────────────────────────────────────────────────── */

  /* Japanese preference → hide English posts (slugs NOT ending in -ja/) */
  html.lang-pref-ja #post-list article.card-wrapper:not(:has(a[href$="-ja/"])),
  html.lang-pref-ja #page-category ul.content li:not(:has(a[href$="-ja/"])),
  html.lang-pref-ja #page-tag      ul.content li:not(:has(a[href$="-ja/"])),
  html.lang-pref-ja #archives ul.list-unstyled li:not(:has(a[href$="-ja/"])),
  html.lang-pref-ja #search-results article:not(:has(a[href$="-ja/"])) {
    display: none !important;
  }

  /* English preference → hide Japanese posts (slugs ending in -ja/) */
  html.lang-pref-en #post-list article.card-wrapper:has(a[href$="-ja/"]),
  html.lang-pref-en #page-category ul.content li:has(a[href$="-ja/"]),
  html.lang-pref-en #page-tag      ul.content li:has(a[href$="-ja/"]),
  html.lang-pref-en #archives ul.list-unstyled li:has(a[href$="-ja/"]),
  html.lang-pref-en #search-results article:has(a[href$="-ja/"]) {
    display: none !important;
  }

  /* ── Per-post language switcher bar ── */
  .lang-switch-bar {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    margin-bottom: 1.75rem;
    padding: 0.3rem 0.75rem;
    background: var(--card-bg, rgba(0,0,0,0.03));
    border: 1px solid var(--border-color, rgba(0,0,0,0.12));
    border-radius: 6px;
    font-size: 0.85rem;
    user-select: none;
  }
  .lang-switch-bar .lang-btn {
    text-decoration: none;
    color: var(--text-muted-color, #888);
    font-weight: 500;
    padding: 0.05rem 0.25rem;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .lang-switch-bar .lang-btn:hover {
    color: var(--link-color, #4a90e2);
  }
  .lang-switch-bar .lang-btn.active {
    color: var(--link-color, #4a90e2);
    font-weight: 700;
    pointer-events: none;
  }
  .lang-switch-bar .lang-sep {
    color: var(--border-color, #ccc);
    font-weight: 300;
  }
</style>

<script>
  /* ── Global language system ── */
  (function () {
    var PREF_KEY = "siteContentLang";
    var POST_LANG_MAP = {};
{% for post in site.posts %}
    POST_LANG_MAP[{{ post.url | relative_url | jsonify }}] = {{ post.content_lang | default: post.lang | default: "en" | downcase | jsonify }};
{% endfor %}

    function getMeta(name) {
      var el = document.querySelector('meta[name="' + name + '"]');
      return el ? el.content : null;
    }

    function getPrefLang() {
      try {
        return localStorage.getItem(PREF_KEY) || "en";
      } catch (err) {
        return "en";
      }
    }

    function setPrefLang(lang) {
      try {
        localStorage.setItem(PREF_KEY, lang);
      } catch (err) {
        /* Ignore storage failures (private mode / storage-restricted browsers). */
      }
    }

    function normalizePath(raw) {
      try {
        var url = new URL(raw, window.location.origin);
        var path = url.pathname || "/";
        if (!path.startsWith("/")) path = "/" + path;
        if (path.endsWith("/index.html")) {
          path = path.slice(0, -10) || "/";
        }
        return path;
      } catch (err) {
        return "";
      }
    }

    function normalizePostPath(raw) {
      var path = normalizePath(raw);
      if (!path || path.indexOf("/posts/") === -1) return "";
      if (!path.endsWith("/")) path += "/";
      return path;
    }

    function isJapaneseLang(value) {
      return String(value || "").toLowerCase() === "ja";
    }

    function resolvePostLang(rawHref) {
      var path = normalizePostPath(rawHref);
      if (!path) return null;
      return POST_LANG_MAP[path] || (/-ja\/?$/.test(path) ? "ja" : "en");
    }

    /* ── Language selector (appended to body, pinned via CSS position:fixed) ── */
    function injectTopbarSelector(pref) {
      if (document.getElementById("lang-selector-wrap")) return;
      if (!document.body) return;

      var wrap = document.createElement("div");
      wrap.id = "lang-selector-wrap";

      var sel = document.createElement("select");
      sel.id = "lang-selector";

      var optEn = document.createElement("option");
      optEn.value = "en";
      optEn.textContent = "EN";
      optEn.selected = (pref !== "ja");

      var optJa = document.createElement("option");
      optJa.value = "ja";
      optJa.textContent = "日本語";
      optJa.selected = (pref === "ja");

      sel.appendChild(optEn);
      sel.appendChild(optJa);
      sel.addEventListener("change", function () {
        switchLang(this.value);
      });

      wrap.appendChild(sel);
      document.body.appendChild(wrap);
    }

    function updateSelectorUI(lang) {
      var sel = document.getElementById("lang-selector");
      if (sel) sel.value = lang;
    }

    function previousHeading(el) {
      var prev = el ? el.previousElementSibling : null;
      return prev && /^H[1-6]$/.test(prev.tagName) ? prev : null;
    }

    function isVisible(el) {
      return window.getComputedStyle(el).display !== "none";
    }

    function setDisplay(el, show) {
      if (show) {
        el.style.removeProperty("display");
      } else {
        el.style.setProperty("display", "none", "important");
      }
    }

    function cleanupEmptySections() {
      document.querySelectorAll("main .table-wrapper, #panel-wrapper .table-wrapper").forEach(function (wrapper) {
        var rows = Array.from(wrapper.querySelectorAll("tbody tr"));
        if (!rows.length) return;

        var hasVisibleRows = rows.some(isVisible);
        setDisplay(wrapper, hasVisibleRows);
        var heading = previousHeading(wrapper);
        if (heading) setDisplay(heading, hasVisibleRows);
      });

      document.querySelectorAll("main ul, #panel-wrapper ul").forEach(function (list) {
        if (!list.querySelector("a[href*='/posts/']")) return;
        var items = Array.from(list.children).filter(function (el) { return el.tagName === "LI"; });
        if (!items.length) return;

        var hasVisibleItems = items.some(isVisible);
        setDisplay(list, hasVisibleItems);
        var heading = previousHeading(list);
        if (heading) setDisplay(heading, hasVisibleItems);

        /* Also hide preceding <time> year labels in archives */
        var prev = list.previousElementSibling;
        if (prev && prev.tagName === "TIME") setDisplay(prev, hasVisibleItems);
      });
    }

    function findPostContainer(link) {
      return (
        link.closest("tr") ||
        link.closest("article.card-wrapper") ||
        link.closest("#search-results article") ||
        link.closest("li")
      );
    }

    /* ── Apply lang preference class to <html> for CSS-based filtering ── */
    function applyLangClass(lang) {
      var html = document.documentElement;
      if (isJapaneseLang(lang)) {
        html.classList.add("lang-pref-ja");
        html.classList.remove("lang-pref-en");
      } else {
        html.classList.add("lang-pref-en");
        html.classList.remove("lang-pref-ja");
      }
    }

    /* ── Post list filter (JS fallback — also fixes Bootstrap d-flex !important) ── */
    function filterPostList(lang) {
      var postLinks = document.querySelectorAll("a[href*='/posts/']");
      var processed = new Set();

      postLinks.forEach(function (link) {
        /* Skip sidebar, nav, breadcrumb, and per-post switcher bar */
        if (link.closest("#sidebar") ||
            link.closest(".lang-switch-bar") ||
            link.closest("#breadcrumb")) return;

        var container = findPostContainer(link);
        if (!container || processed.has(container)) return;
        processed.add(container);

        var href = link.getAttribute("href") || link.href || "";
        var postLang = resolvePostLang(href);
        if (!postLang) return;

        var shouldShow = isJapaneseLang(lang) ? isJapaneseLang(postLang) : !isJapaneseLang(postLang);
        /* Use setProperty with "important" to override Bootstrap's d-flex !important */
        if (shouldShow) {
          container.style.removeProperty("display");
        } else {
          container.style.setProperty("display", "none", "important");
        }
      });

      cleanupEmptySections();
    }

    /* ── Per-post switcher bar ── */
    function injectPostSwitcher(currentLang, altJa, altEn) {
      if (document.querySelector(".lang-switch-bar")) return;
      var content = document.querySelector("article .content") ||
                    document.querySelector("article") ||
                    document.querySelector(".content") ||
                    document.querySelector("main");
      if (!content) return;

      var bar = document.createElement("div");
      bar.className = "lang-switch-bar";

      var enBtn = document.createElement("a");
      enBtn.textContent = "EN";
      enBtn.className = "lang-btn" + (currentLang === "en" ? " active" : "");
      enBtn.href = altEn || "#";
      enBtn.addEventListener("click", function () {
        setPrefLang("en");
      });

      var sep = document.createElement("span");
      sep.textContent = " | ";
      sep.className = "lang-sep";

      var jaBtn = document.createElement("a");
      jaBtn.textContent = "日本語";
      jaBtn.className = "lang-btn" + (currentLang === "ja" ? " active" : "");
      jaBtn.href = altJa || "#";
      jaBtn.addEventListener("click", function () {
        setPrefLang("ja");
      });

      bar.appendChild(enBtn);
      bar.appendChild(sep);
      bar.appendChild(jaBtn);
      content.insertBefore(bar, content.firstChild);
    }

    /* ── Switch language globally ── */
    function switchLang(lang) {
      setPrefLang(lang);
      updateSelectorUI(lang);
      applyLangClass(lang);
      filterPostList(lang);

      /* If on a post page, redirect to alternate language version */
      var currentLang = (getMeta("page-lang") || "").toLowerCase();
      if (currentLang) {
        var altJa = getMeta("lang-alt-ja");
        var altEn = getMeta("lang-alt-en");
        if (isJapaneseLang(lang) && currentLang === "en" && altJa) {
          window.location.replace(altJa);
        } else if (!isJapaneseLang(lang) && currentLang === "ja" && altEn) {
          window.location.replace(altEn);
        }
      }
    }

    /* ── Main init ── */
    function init() {
      var pref = getPrefLang();

      /* Apply lang class to <html> immediately (CSS filtering, persists across Turbo) */
      applyLangClass(pref);

      /* Topbar language selector (all pages) */
      injectTopbarSelector(pref);

      /* Post list filter fallback (home / techblog / category / tag pages) */
      filterPostList(pref);

      /* Per-post logic */
      var currentLang = (getMeta("page-lang") || "").toLowerCase();
      if (currentLang) {
        var altJa = getMeta("lang-alt-ja");
        var altEn = getMeta("lang-alt-en");

        /* Auto-redirect to preferred language version */
        if (isJapaneseLang(pref) && currentLang === "en" && altJa) {
          window.location.replace(altJa);
          return;
        }
        if (!isJapaneseLang(pref) && currentLang === "ja" && altEn) {
          window.location.replace(altEn);
          return;
        }

        injectPostSwitcher(currentLang, altJa, altEn);
      }
    }

    function runInitSafe() {
      try {
        init();
      } catch (err) {
        console.error("[lang-selector] init failed:", err);
      }
    }

    function runInitWithRetry() {
      var attempts = 0;
      var maxAttempts = 20;
      var intervalMs = 250;

      function tick() {
        runInitSafe();
        attempts += 1;

        /* Some theme flows rebuild topbar asynchronously; keep retrying briefly. */
        if (!document.getElementById("lang-selector-wrap") && attempts < maxAttempts) {
          window.setTimeout(tick, intervalMs);
        }
      }

      tick();
    }

    /* Run immediately, then run again on key lifecycle events. */
    runInitWithRetry();
    document.addEventListener("DOMContentLoaded", runInitWithRetry);
    document.addEventListener("turbo:load", runInitWithRetry);
    document.addEventListener("readystatechange", function () {
      if (document.readyState === "interactive" || document.readyState === "complete") {
        runInitWithRetry();
      }
    });
    window.addEventListener("load", runInitWithRetry);
  })();

  /* Keep writeup categories on top and move TechBlog to the bottom on /categories/. */
  (function () {
    function reorderCategories() {
      var path = window.location.pathname.replace(/\/+$/, "");
      if (!path.endsWith("/categories")) return;

      var root = document.getElementById("categories");
      if (!root) return;

      var list = root.querySelector("ul");
      if (!list) return;

      var items = Array.from(list.children).filter(function (el) {
        return el.tagName === "LI";
      });

      if (!items.length) return;

      var writeupItems = [];
      var techBlogItems = [];

      items.forEach(function (item) {
        var isTechBlog = item.querySelector('a[href*="/categories/techblog/"]');
        if (isTechBlog) {
          techBlogItems.push(item);
        } else {
          writeupItems.push(item);
        }
      });

      writeupItems.sort(function (a, b) {
        var aName = (a.querySelector("a") || {}).textContent || "";
        var bName = (b.querySelector("a") || {}).textContent || "";
        return aName.trim().localeCompare(bName.trim(), "en", { sensitivity: "base" });
      });

      if (!techBlogItems.length) return;

      writeupItems.concat(techBlogItems).forEach(function (item) {
        list.appendChild(item);
      });
    }

    ["DOMContentLoaded", "turbo:load", "pjax:complete"].forEach(function (eventName) {
      document.addEventListener(eventName, reorderCategories);
    });

    window.addEventListener("load", reorderCategories);
  })();
</script>
