{% if page.content_lang %}
<meta name="page-lang" content="{{ page.content_lang }}">
{% endif %}
{% if page.alt_ja %}
<meta name="lang-alt-ja" content="{{ page.alt_ja }}">
{% endif %}
{% if page.alt_en %}
<meta name="lang-alt-en" content="{{ page.alt_en }}">
{% endif %}

  function gtag(){dataLayer.push(arguments);}

<style>
  /* Center the avatar subject inside the circular frame in the sidebar. */
  #sidebar #avatar {
    overflow: hidden;
  }

  #sidebar #avatar > img,
  #sidebar img#avatar {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: 50% 42%;
  }

  /* Show a medium-sized author line between blog title and tagline in the sidebar. */
  #sidebar .site-title::after {
    content: "Author: Paul (Christian name)";
    display: block;
    margin: 0.55rem 0 0;
    padding: 0 0 0.55rem;
    font-size: 1.08rem;
    font-weight: 650;
    line-height: 1.35;
    color: var(--heading-color);
    border-bottom: 1px solid rgba(127, 127, 127, 0.35);
  }

  #sidebar .site-subtitle {
    margin-top: 0.58rem !important;
  }

  /* ── Global language toggle (sidebar) ── */
  .global-lang-toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    margin: 0.75rem 0 0;
    padding: 0.25rem 0.6rem;
    background: rgba(127, 127, 127, 0.08);
    border: 1px solid rgba(127, 127, 127, 0.25);
    border-radius: 6px;
    font-size: 0.8rem;
    user-select: none;
  }
  .lang-toggle-btn {
    text-decoration: none;
    color: var(--sidebar-muted-color, rgba(255,255,255,0.55));
    font-weight: 500;
    padding: 0.05rem 0.2rem;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.15s;
    background: none;
    border: none;
    font-size: inherit;
    font-family: inherit;
  }
  .lang-toggle-btn:hover {
    color: var(--sidebar-active-color, #fff);
  }
  .lang-toggle-btn.active {
    color: var(--sidebar-active-color, #fff);
    font-weight: 700;
  }
  .lang-toggle-sep {
    color: rgba(127, 127, 127, 0.45);
    font-weight: 300;
  }

  /* ── Per-post language switcher bar ── */
  .lang-switch-bar {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    margin-bottom: 1.75rem;
    padding: 0.3rem 0.75rem;
    background: var(--card-bg, rgba(0,0,0,0.03));
    border: 1px solid var(--border-color, rgba(0,0,0,0.12));
    border-radius: 6px;
    font-size: 0.85rem;
    user-select: none;
  }
  .lang-switch-bar .lang-btn {
    text-decoration: none;
    color: var(--text-muted-color, #888);
    font-weight: 500;
    padding: 0.05rem 0.25rem;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .lang-switch-bar .lang-btn:hover {
    color: var(--link-color, #4a90e2);
  }
  .lang-switch-bar .lang-btn.active {
    color: var(--link-color, #4a90e2);
    font-weight: 700;
    pointer-events: none;
  }
  .lang-switch-bar .lang-sep {
    color: var(--border-color, #ccc);
    font-weight: 300;
  }
</style>

<script>
  // ── Global language system ──
  (function () {
    var PREF_KEY = "techblogLang";

    function getMeta(name) {
      var el = document.querySelector('meta[name="' + name + '"]');
      return el ? el.content : null;
    }

    function isJaPostUrl(href) {
      return /\/posts\/[^\/]+-ja\/?(\?.*)?$/.test(href || "");
    }

    // ── Sidebar global toggle ──
    function injectSidebarToggle(pref) {
      if (document.querySelector(".global-lang-toggle")) return;
      var subtitle = document.querySelector("#sidebar .site-subtitle");
      if (!subtitle) return;

      var wrap = document.createElement("div");
      wrap.className = "global-lang-toggle";

      var enBtn = document.createElement("button");
      enBtn.textContent = "EN";
      enBtn.className = "lang-toggle-btn" + (pref !== "ja" ? " active" : "");
      enBtn.addEventListener("click", function () { switchLang("en"); });

      var sep = document.createElement("span");
      sep.textContent = " | ";
      sep.className = "lang-toggle-sep";

      var jaBtn = document.createElement("button");
      jaBtn.textContent = "日本語";
      jaBtn.className = "lang-toggle-btn" + (pref === "ja" ? " active" : "");
      jaBtn.addEventListener("click", function () { switchLang("ja"); });

      wrap.appendChild(enBtn);
      wrap.appendChild(sep);
      wrap.appendChild(jaBtn);
      subtitle.insertAdjacentElement("afterend", wrap);
    }

    function updateToggleUI(lang) {
      var btns = document.querySelectorAll(".global-lang-toggle .lang-toggle-btn");
      if (!btns.length) return;
      btns[0].className = "lang-toggle-btn" + (lang !== "ja" ? " active" : ""); // EN
      btns[1].className = "lang-toggle-btn" + (lang === "ja" ? " active" : ""); // JA
    }

    // ── Post list filter ──
    function filterPostList(lang) {
      // Don't filter on individual post pages
      if (getMeta("page-lang")) return;

      var postLinks = document.querySelectorAll("a[href*='/posts/']");
      var processed = [];

      postLinks.forEach(function (link) {
        // Skip sidebar, nav, breadcrumb, and per-post switcher bar
        if (link.closest("#sidebar") || link.closest("nav") ||
            link.closest(".breadcrumb") || link.closest(".lang-switch-bar")) return;

        // Walk up to the nearest list item or article card
        var container = link.closest("li") || link.closest("article");
        if (!container || processed.indexOf(container) !== -1) return;
        processed.push(container);

        var href = link.getAttribute("href") || "";
        var isJa = isJaPostUrl(href);
        container.style.display = (lang === "ja") === isJa ? "" : "none";
      });
    }

    // ── Per-post switcher bar ──
    function injectPostSwitcher(currentLang, altJa, altEn) {
      if (document.querySelector(".lang-switch-bar")) return;
      var content = document.querySelector("article .content") ||
                    document.querySelector("article") ||
                    document.querySelector(".content") ||
                    document.querySelector("main");
      if (!content) return;

      var bar = document.createElement("div");
      bar.className = "lang-switch-bar";

      var enBtn = document.createElement("a");
      enBtn.textContent = "EN";
      enBtn.className = "lang-btn" + (currentLang === "en" ? " active" : "");
      enBtn.href = altEn || "#";
      enBtn.addEventListener("click", function () {
        localStorage.setItem(PREF_KEY, "en");
      });

      var sep = document.createElement("span");
      sep.textContent = " | ";
      sep.className = "lang-sep";

      var jaBtn = document.createElement("a");
      jaBtn.textContent = "日本語";
      jaBtn.className = "lang-btn" + (currentLang === "ja" ? " active" : "");
      jaBtn.href = altJa || "#";
      jaBtn.addEventListener("click", function () {
        localStorage.setItem(PREF_KEY, "ja");
      });

      bar.appendChild(enBtn);
      bar.appendChild(sep);
      bar.appendChild(jaBtn);
      content.insertBefore(bar, content.firstChild);
    }

    // ── Switch language globally ──
    function switchLang(lang) {
      localStorage.setItem(PREF_KEY, lang);
      updateToggleUI(lang);
      filterPostList(lang);

      // If on a post page, redirect to alternate language version
      var currentLang = getMeta("page-lang");
      if (currentLang) {
        var altJa = getMeta("lang-alt-ja");
        var altEn = getMeta("lang-alt-en");
        if (lang === "ja" && currentLang === "en" && altJa) {
          window.location.replace(altJa);
        } else if (lang === "en" && currentLang === "ja" && altEn) {
          window.location.replace(altEn);
        }
      }
    }

    // ── Main init ──
    function init() {
      var pref = localStorage.getItem(PREF_KEY) || "en";

      // Sidebar toggle (all pages)
      injectSidebarToggle(pref);

      // Post list filter (home / archive / category pages)
      filterPostList(pref);

      // Per-post logic
      var currentLang = getMeta("page-lang");
      if (currentLang) {
        var altJa = getMeta("lang-alt-ja");
        var altEn = getMeta("lang-alt-en");

        // Auto-redirect to preferred language version
        if (pref === "ja" && currentLang === "en" && altJa) {
          window.location.replace(altJa);
          return;
        }
        if (pref === "en" && currentLang === "ja" && altEn) {
          window.location.replace(altEn);
          return;
        }

        injectPostSwitcher(currentLang, altJa, altEn);
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
    document.addEventListener("turbo:load", init);
    window.addEventListener("load", init);
  })();

  // Keep writeup categories on top and move TechBlog to the bottom on /categories/.
  (function () {
    function reorderCategories() {
      var path = window.location.pathname.replace(/\/+$/, "");
      if (!path.endsWith("/categories")) return;

      var root = document.getElementById("categories");
      if (!root) return;

      var list = root.querySelector("ul");
      if (!list) return;

      var items = Array.from(list.children).filter(function (el) {
        return el.tagName === "LI";
      });

      if (!items.length) return;

      var writeupItems = [];
      var techBlogItems = [];

      items.forEach(function (item) {
        var isTechBlog = item.querySelector('a[href*="/categories/techblog/"]');
        if (isTechBlog) {
          techBlogItems.push(item);
        } else {
          writeupItems.push(item);
        }
      });

      writeupItems.sort(function (a, b) {
        var aName = (a.querySelector("a") || {}).textContent || "";
        var bName = (b.querySelector("a") || {}).textContent || "";
        return aName.trim().localeCompare(bName.trim(), "en", { sensitivity: "base" });
      });

      if (!techBlogItems.length) return;

      writeupItems.concat(techBlogItems).forEach(function (item) {
        list.appendChild(item);
      });
    }

    ["DOMContentLoaded", "turbo:load", "pjax:complete"].forEach(function (eventName) {
      document.addEventListener(eventName, reorderCategories);
    });

    window.addEventListener("load", reorderCategories);
  })();
</script>
