<style>
  /* Center the avatar subject inside the circular frame in the sidebar. */
  #sidebar #avatar {
    overflow: hidden;
  }

  #sidebar #avatar > img,
  #sidebar img#avatar {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: 50% 42%;
  }

  /* Add a medium-sized author line between blog title and tagline in the sidebar. */
  #sidebar .site-author-name {
    margin: 0.2rem 0 0.2rem;
    font-size: 1.32rem;
    font-weight: 600;
    line-height: 1.25;
    color: var(--heading-color);
  }
</style>

<script>
  // Insert "Paul (Christian name)" between the site title and tagline in the sidebar.
  (function () {
    function injectSidebarAuthorName() {
      var sidebar = document.getElementById("sidebar");
      if (!sidebar) return;

      var title = sidebar.querySelector(".site-title");
      var subtitle = sidebar.querySelector(".site-subtitle");
      if (!title || !subtitle) return;

      if (sidebar.querySelector(".site-author-name")) return;

      var authorLine = document.createElement("p");
      authorLine.className = "site-author-name";
      authorLine.textContent = "Paul (Christian name)";

      subtitle.parentNode.insertBefore(authorLine, subtitle);
    }

    ["DOMContentLoaded", "turbo:load", "pjax:complete"].forEach(function (eventName) {
      document.addEventListener(eventName, injectSidebarAuthorName);
    });

    window.addEventListener("load", injectSidebarAuthorName);
  })();

  // Keep writeup categories on top and move TechBlog to the bottom on /categories/.
  (function () {
    function reorderCategories() {
      var path = window.location.pathname.replace(/\/+$/, "");
      if (!path.endsWith("/categories")) return;

      var root = document.getElementById("categories");
      if (!root) return;

      var list = root.querySelector("ul");
      if (!list) return;

      var items = Array.from(list.children).filter(function (el) {
        return el.tagName === "LI";
      });

      if (!items.length) return;

      var writeupItems = [];
      var techBlogItems = [];

      items.forEach(function (item) {
        var isTechBlog = item.querySelector('a[href*="/categories/techblog/"]');
        if (isTechBlog) {
          techBlogItems.push(item);
        } else {
          writeupItems.push(item);
        }
      });

      writeupItems.sort(function (a, b) {
        var aName = (a.querySelector("a") || {}).textContent || "";
        var bName = (b.querySelector("a") || {}).textContent || "";
        return aName.trim().localeCompare(bName.trim(), "en", { sensitivity: "base" });
      });

      if (!techBlogItems.length) return;

      writeupItems.concat(techBlogItems).forEach(function (item) {
        list.appendChild(item);
      });
    }

    ["DOMContentLoaded", "turbo:load", "pjax:complete"].forEach(function (eventName) {
      document.addEventListener(eventName, reorderCategories);
    });

    window.addEventListener("load", reorderCategories);
  })();
</script>
