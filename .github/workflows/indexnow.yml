name: "Notify IndexNow"

on:
  workflow_run:
    workflows:
      - "Build and Deploy"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "indexnow"
  cancel-in-progress: true

jobs:
  notify:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Wait for GitHub Pages propagation
        if: ${{ github.event_name == 'workflow_run' }}
        run: sleep 60

      - name: Submit sitemap URLs to IndexNow
        env:
          SITE_HOST: morimori-dev.github.io
          SITEMAP_URL: https://morimori-dev.github.io/sitemap.xml
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          import xml.etree.ElementTree as ET

          host = os.environ["SITE_HOST"]
          sitemap_url = os.environ["SITEMAP_URL"]
          endpoint = "https://api.indexnow.org/indexnow"

          key = None
          for filename in os.listdir("."):
              if not re.fullmatch(r"[0-9a-fA-F]{32}\.txt", filename):
                  continue
              with open(filename, "r", encoding="utf-8") as key_file:
                  value = key_file.read().strip()
              if value == filename[:-4]:
                  key = value
                  break

          if not key:
              raise SystemExit("IndexNow key file was not found")

          key_location = f"https://{host}/{key}.txt"

          with urllib.request.urlopen(sitemap_url, timeout=30) as response:
              sitemap = response.read()

          root = ET.fromstring(sitemap)
          ns = {"sm": "http://www.sitemaps.org/schemas/sitemap/0.9"}
          urls = [
              loc.text.strip()
              for loc in root.findall(".//sm:loc", ns)
              if loc.text and loc.text.strip().startswith(f"https://{host}/")
          ]
          urls = list(dict.fromkeys(urls))

          if not urls:
              raise SystemExit("No URLs found in sitemap")

          for index in range(0, len(urls), 10000):
              batch = urls[index:index + 10000]
              payload = {
                  "host": host,
                  "key": key,
                  "keyLocation": key_location,
                  "urlList": batch,
              }
              request = urllib.request.Request(
                  endpoint,
                  data=json.dumps(payload).encode("utf-8"),
                  method="POST",
                  headers={"Content-Type": "application/json; charset=utf-8"},
              )

              try:
                  with urllib.request.urlopen(request, timeout=60) as response:
                      print(f"Submitted {len(batch)} URLs: HTTP {response.status}")
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", "replace")
                  raise SystemExit(f"IndexNow failed: HTTP {error.code}\n{body}")

          print(f"IndexNow notification complete: {len(urls)} URLs")
          PY
