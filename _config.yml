# ============================================================
# Site Settings
# ============================================================
theme: jekyll-theme-chirpy
lang: en
timezone: Asia/Tokyo

title: "morimori-dev"
tagline: "OSCP | Penetration Tester | Security Writeups"
description: >-
  Cybersecurity portfolio featuring writeups for OSCP Proving Grounds,
  Hack The Box, and TryHackMe machines, along with technical blog posts.

url: "https://morimori-dev.github.io"
# baseurl: ""

github:
  username: morimori-dev

social:
  name: morimori-dev
  email: your.email@example.com    # ← 自分のメールに変更
  links:
    - https://github.com/morimori-dev
    - https://linkedin.com/in/yourprofile    # ← 自分のLinkedInに変更
    # - https://app.hackthebox.com/profile/XXXXXX

# ============================================================
# Theme Mode
# ============================================================
theme_mode: dark

# ============================================================
# Avatar
# ============================================================
avatar: /assets/img/avatar.jpg

# ============================================================
# Table of Contents
# ============================================================
toc: true

# ============================================================
# Permalink（★ URL から日付を除外する設定）
# ============================================================
# これにより記事URLが以下のようになる:
#   /posts/htb-sau/      （日付なし）
#   /posts/pg-craft/     （日付なし）
permalink: /posts/:title/

# ============================================================
# Comments (Optional - 必要になったら有効化)
# ============================================================
# comments:
#   provider: giscus
#   giscus:
#     repo: morimori-dev/morimori-dev.github.io
#     repo_id:
#     category: Comments
#     category_id:

# ============================================================
# Analytics (Optional - 必要になったら有効化)
# ============================================================
# analytics:
#   google:
#     id: G-XXXXXXXXXX

# ============================================================
# Pagination
# ============================================================
paginate: 15

# ============================================================
# Default Front Matter
# ============================================================
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      pin: false
      math: false
      mermaid: false

# ============================================================
# Sass / CSS
# ============================================================
sass:
  style: compressed

# ============================================================
# Markdown / Syntax Highlighting
# ============================================================
markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true

# ============================================================
# Exclude
# ============================================================
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - rollup.config.js
  - package*.json
  - node_modules
  - "*.log"