# ==============================================================================
# _config.yml - Chirpy Theme Configuration for morimori-dev
# ==============================================================================

# ----- Site Settings -----
theme: jekyll-theme-chirpy
lang: en
timezone: Asia/Tokyo

title: "morimori-dev | Security Portfolio"
tagline: "OSCP | Penetration Tester | CTF Writeups"
description: >-
  Cybersecurity portfolio featuring writeups for OSCP Proving Grounds,
  Hack The Box, and TryHackMe machines, along with technical blog posts.

url: "https://morimori-dev.github.io"
# baseurl: ""

github:
  username: morimori-dev

social:
  name: morimori-dev
  email: morimori-dev@example.com          # ← 実際のメールに変更
  links:
    - https://github.com/morimori-dev
    - https://linkedin.com/in/morimori-dev # ← 実際のURLに変更
    # - https://twitter.com/morimori_dev
    # - https://app.hackthebox.com/profile/XXXXXX

# ----- Theme Mode -----
theme_mode: dark

# ----- Avatar / Profile -----
avatar: /assets/img/avatar.jpg

# ----- Table of Contents -----
toc: true

# ----- Comments (Optional - 後から有効化可能) -----
# comments:
#   provider: giscus
#   giscus:
#     repo: morimori-dev/morimori-dev.github.io
#     repo_id:           # ← giscus.app で取得
#     category: Comments
#     category_id:       # ← giscus.app で取得

# ----- Analytics (Optional - 後から有効化可能) -----
# analytics:
#   google:
#     id: G-XXXXXXXXXX

# ----- Pagination -----
paginate: 15

# ----- Default Front Matter -----
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      pin: false
      math: false
      mermaid: false
      image:
        lqip: ""

# ----- Sass / CSS -----
sass:
  style: compressed

# ----- Build Settings -----
markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true

# ----- Exclude -----
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - rollup.config.js
  - package*.json
  - node_modules